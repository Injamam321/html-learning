<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="first-name">First Name</label> <br>
        <input type="text" name="first_name" id ="first-name" > <br><br>

        <label for="last-name">Last Name</label> <br>
        <input type="text" name="last_name" id ="last-name" > <br><br>

        <label for="pasword"> Password</label><br>
        <input type="password" name="password_create" id="pasword"><br><br>

        <label for="email">Email:</label> <br>
        <input type="email" id="email" name="email"><br><br>
    
        <label for="url">Website:</label><br>
        <input type="url" id="url" name="url"><br><br>

        <label for="file">Upload your file </label>
        <input type="file" name="file" id="file"> <br> <br>

        Gender <br>
        <input type="radio" name="gender" id="Male"> <label for="Male"> Male </label><br>
        <input type="radio" name="gender" id="Female"> <label for="Female"> Female </label><br><br>

    
        <label for="birthday"> Date of Birth:</label><br>
        <input type="date" id="birthday" name="birthday"><br><br>
    
        <label for="range">Volume:</label><br>
        <input type="range" id="range" name="volume" min="0" max="100"><br><br>
    
        <label for="favcolor">Favorite Color:</label><br>
        <input type="color" id="favcolor" name="favcolor"><br><br>
    
        <input type="submit" value="Submit">
    </form>
    
</body>
</html>
